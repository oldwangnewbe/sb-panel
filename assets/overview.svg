<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">SailBox 多服务器管理结构图</title>
  <desc id="desc">一个 SailBox 管理多台服务器，并向多个客户端提供统一订阅。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse"><stop stop-color="#111827"/><stop offset="1" stop-color="#1E1639"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#AE8CFF"/><stop offset="1" stop-color="#6B45E6"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#070B16" flood-opacity=".42"/></filter>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="70" r="180" fill="#7548E8" fill-opacity=".13"/>
  <circle cx="110" cy="500" r="170" fill="#35C5D8" fill-opacity=".07"/>
  <text x="70" y="82" fill="#F8FAFC" font-family="Arial, PingFang SC, sans-serif" font-size="31" font-weight="700">一个面板，统一管理</text>
  <text x="70" y="116" fill="#9CA8BD" font-family="Arial, PingFang SC, sans-serif" font-size="18">用户 · 协议 · 订阅 · 路由</text>
  <g stroke="#9A76FF" stroke-opacity=".62" stroke-width="2">
    <path d="M330 232H438"/><path d="M760 232H870"/><path d="M330 362H438"/><path d="M760 362H870"/>
  </g>
  <g fill="#9A76FF"><circle cx="438" cy="232" r="5"/><circle cx="760" cy="232" r="5"/><circle cx="438" cy="362" r="5"/><circle cx="760" cy="362" r="5"/></g>
  <g filter="url(#shadow)">
    <rect x="70" y="172" width="260" height="120" rx="20" fill="#1B2334" stroke="#344158"/>
    <rect x="70" y="302" width="260" height="120" rx="20" fill="#1B2334" stroke="#344158"/>
    <rect x="870" y="172" width="260" height="120" rx="20" fill="#1B2334" stroke="#344158"/>
    <rect x="870" y="302" width="260" height="120" rx="20" fill="#1B2334" stroke="#344158"/>
    <rect x="438" y="155" width="322" height="284" rx="26" fill="#241B41" stroke="#9672FF" stroke-width="2"/>
  </g>
  <g font-family="Arial, PingFang SC, sans-serif">
    <g transform="translate(96 198)"><rect width="45" height="45" rx="14" fill="#27334A"/><path d="M14 28h17M22.5 13v21" stroke="#6EE7F0" stroke-width="3" stroke-linecap="round"/><text x="62" y="20" fill="#F8FAFC" font-size="21" font-weight="700">节点 A</text><text x="62" y="43" fill="#9CA8BD" font-size="14">VLESS · Trojan</text></g>
    <g transform="translate(96 328)"><rect width="45" height="45" rx="14" fill="#27334A"/><path d="M14 28h17M22.5 13v21" stroke="#6EE7F0" stroke-width="3" stroke-linecap="round"/><text x="62" y="20" fill="#F8FAFC" font-size="21" font-weight="700">节点 B</text><text x="62" y="43" fill="#9CA8BD" font-size="14">TUIC · Hysteria2</text></g>
    <g transform="translate(896 198)"><rect width="45" height="45" rx="14" fill="#27334A"/><path d="M14 28h17M22.5 13v21" stroke="#6EE7F0" stroke-width="3" stroke-linecap="round"/><text x="62" y="20" fill="#F8FAFC" font-size="21" font-weight="700">节点 C</text><text x="62" y="43" fill="#9CA8BD" font-size="14">AnyTLS · Snell</text></g>
    <g transform="translate(896 328)"><rect width="45" height="45" rx="14" fill="#27334A"/><path d="M14 28h17M22.5 13v21" stroke="#6EE7F0" stroke-width="3" stroke-linecap="round"/><text x="62" y="20" fill="#F8FAFC" font-size="21" font-weight="700">统一订阅</text><text x="62" y="43" fill="#9CA8BD" font-size="14">Clash · Mihomo · Surge</text></g>
    <g transform="translate(493 194)"><rect width="54" height="54" rx="17" fill="url(#purple)"/><rect x="14" y="26" width="7" height="16" rx="3.5" fill="white"/><rect x="24" y="15" width="7" height="27" rx="3.5" fill="white"/><rect x="34" y="22" width="7" height="20" rx="3.5" fill="white"/><text x="69" y="25" fill="#F8FAFC" font-size="26" font-weight="700">SailBox</text><text x="69" y="48" fill="#B8A8EE" font-size="14">控制面</text></g>
    <text x="501" y="295" fill="#D8D2EA" font-size="17">用户与流量</text><text x="501" y="326" fill="#D8D2EA" font-size="17">多协议节点</text><text x="501" y="357" fill="#D8D2EA" font-size="17">聚合订阅</text><text x="501" y="388" fill="#D8D2EA" font-size="17">中转与路由</text>
  </g>
  <text x="70" y="504" fill="#A895E8" font-family="Arial, PingFang SC, sans-serif" font-size="15">Private release · sing-box powered</text>
</svg>
